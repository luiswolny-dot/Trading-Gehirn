name: Trading-Gehirn Analyse

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python analyse.py
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
      - run: python generate_notes.py
      - run: |
          git config user.name "trading-gehirn-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ vault/
          git diff --quiet && git diff --staged --quiet || git commit -m "Analyse-Update $(date -u)"
          git push
